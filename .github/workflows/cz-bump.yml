name: CZ-Bump

env:
  COMMITIZEN_VERSION: 4.13.9

on:
  pull_request:
    types: [closed]
    branches: ["main"]

permissions:
  actions: write
  contents: write

concurrency:
  group: pr-merged-${{ github.ref }}
  cancel-in-progress: false

jobs:
  post-merge-checks:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v ./...

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Commitizen
        run: python -m pip install --upgrade pip commitizen==${COMMITIZEN_VERSION}

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and changelog
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          if cz bump --yes; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "tag=$(git tag --points-at HEAD | tail -n 1)" >> "$GITHUB_OUTPUT"
          else
            echo "No eligible commits for version bump; skipping push."
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push bump commit and tag
        if: steps.bump.outputs.bumped == 'true'
        run: git push origin HEAD:main --tags

      - name: Dispatch release workflow
        if: steps.bump.outputs.bumped == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: 'main',
              inputs: {
                tag: '${{ steps.bump.outputs.tag }}'
              }
            })
